services:
  - type: web
    name: mental-health-app
    runtime: python3
    buildCommand: |
      pip install -r requirements.txt
      cd mental
      python manage.py migrate
      python manage.py collectstatic --noinput
    startCommand: cd mental && gunicorn mental.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mental-db
          property: connectionString
    healthCheckPath: /
    plan: free

databases:
  - name: mental-db
    databaseName: mental
    user: mental
    plan: free